name: Lint and Format

on:
  push:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/lint-and-format.yaml
  pull_request:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/lint-and-format.yaml

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v6
      with:
        node-version: 20.x
        cache: npm
        cache-dependency-path: Backend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Run ESLint with annotations
      id: eslint
      continue-on-error: true
      run: |
        set -o pipefail
        npm run eslint 2>&1 | tee eslint-output.log

    - name: Run Prettier check with annotations
      id: prettier
      continue-on-error: true
      run: |
        set -o pipefail
        npm run format:check 2>&1 | tee prettier-output.log

    - name: Annotate lint/format issues and fail if needed
      if: always()
      run: |
        FAILED=0

        if [ "${{ steps.eslint.outcome }}" != "success" ]; then
          FAILED=1
          echo "::error title=ESLint failed::Run npm run eslint:fix to auto-fix lint issues."
          echo "### ESLint failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Suggested fix: npm run eslint:fix" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### ESLint output (tail)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 50 eslint-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "${{ steps.prettier.outcome }}" != "success" ]; then
          FAILED=1
          echo "::error title=Prettier check failed::Run npm run format to auto-fix formatting issues, then verify with npm run format:check."
          echo "### Prettier check failed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Suggested fix: npm run format" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verify with: npm run format:check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "#### Prettier output (tail)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -n 50 prettier-output.log >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$FAILED" -eq 1 ]; then
          exit 1
        fi

        echo "### Lint and format checks passed" >> "$GITHUB_STEP_SUMMARY"
        echo "- ESLint: success" >> "$GITHUB_STEP_SUMMARY"
        echo "- Prettier check: success" >> "$GITHUB_STEP_SUMMARY"
