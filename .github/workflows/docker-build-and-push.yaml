name: Docker Build and Push

on:
  push:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/docker-build-and-push.yaml
  pull_request:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/docker-build-and-push.yaml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Generate prod timestamp tag
      id: ts
      run: echo "value=$(date +'%y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/stackmind-backend
        tags: |
          type=ref,event=branch
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=prod-${{ steps.ts.outputs.value }}

    - name: Build and push multi-platform image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: ./Backend
        file: ./Backend/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Summarize image publication
      if: always()
      run: |
        echo "### Docker build summary" >> "$GITHUB_STEP_SUMMARY"
        echo "- Image: ${{ secrets.DOCKER_USERNAME }}/stackmind-backend" >> "$GITHUB_STEP_SUMMARY"
        echo "- Platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
        echo "- Push performed: ${{ github.event_name == 'push' }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "#### Tags" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
