name: Docker Build and Push

on:
  push:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/docker-build-and-push.yaml
  pull_request:
    branches: [ main, staging ]
    paths:
    - Backend/**
    - .github/workflows/docker-build-and-push.yaml

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY || format('{0}/stackmind-backend', secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME || github.repository_owner) }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Generate prod timestamp tag
      id: ts
      run: echo "value=$(date +'%y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"

    - name: Validate Docker Hub credentials
      if: github.event_name == 'push'
      run: |
        if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
          echo "::error title=Missing Docker Hub credentials::Set DOCKERHUB_USERNAME/DOCKERHUB_TOKEN (or DOCKER_USERNAME/DOCKER_PASSWORD). The token must include Read and Write repository scopes."
          exit 1
        fi

    - name: Log in to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v4
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.DOCKERHUB_REPOSITORY }}
        tags: |
          type=ref,event=branch
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=prod-${{ steps.ts.outputs.value }}

    - name: Build and push multi-platform image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: ./Backend
        file: ./Backend/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name == 'push' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Summarize image publication
      if: always()
      run: |
        echo "### Docker build summary" >> "$GITHUB_STEP_SUMMARY"
        echo "- Image: ${{ env.DOCKERHUB_REPOSITORY }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Platforms: linux/amd64, linux/arm64" >> "$GITHUB_STEP_SUMMARY"
        echo "- Push performed: ${{ github.event_name == 'push' }}" >> "$GITHUB_STEP_SUMMARY"
        echo "- Digest: ${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        echo "#### Tags" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
        echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
        echo '```' >> "$GITHUB_STEP_SUMMARY"
